<div class="flex flex-col gap-6">
    <app-title main="Tarefas" sub="Exemplo de listas de tarefas com componentes"></app-title>

    <div class="grid grid-cols-4 gap-10 m-20">
        @for (item of todoService.items(); track item.id) {
        <div (click)="todoService.itemCompleted(item)"
            class="border border-gray-500 text-gray-300 rounded flex flex-col justify-between p-7 cursor-pointer">
            
            {{ item.title }}

            <div class="flex flex-col items-center mt-7" [class.text-green-700]="item.completed"
                [class.text-orange-800]="!item.completed">
                {{ item.completed ? 'Concluído' : 'Pendente' }}
            </div>
        </div>
        }
    </div>
</div>
